<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firm Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 250px;
    background: #1e293b;
    color: white;
    height: 100vh;
    padding: 20px;
}

.company-name {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 30px;
}

.menu-item {
    padding: 12px;
    margin-bottom: 5px;
    cursor: pointer;
    border-radius: 6px;
}

.menu-item:hover {
    background: #334155;
}

/* Submenu */
.submenu {
    display: none;
    margin-left: 10px;
}

.submenu-item {
    padding: 10px;
    font-size: 14px;
    background: #0f172a;
    margin-bottom: 3px;
    border-radius: 4px;
    cursor: pointer;
}

.submenu-item:hover {
    background: #1e293b;
}

/* Main content */
.main {
    flex: 1;
    padding: 20px;
    background: #f1f5f9;
}

</style>
</head>

<body>

<div class="sidebar">
    <div class="company-name">SJ Financial Services</div>

    <div class="menu-item"> Due this week</div>
    <div class="menu-item"> Due this month</div>

    <div class="menu-item" onclick="toggleSars()"> SARS</div>
    <div id="sars-submenu" class="submenu">
        <div class="submenu-item">Company Taxes</div>
        <div class="submenu-item">Personal Taxes</div>
    </div>

    <div class="menu-item"> CIPC</div>
    <div class="menu-item"> Secreterial</div>
    <div class="menu-item"> Staff workload</div>
    <div class="menu-item"> Reports</div>
</div>

<div class="main">
    <h1>Dashboard</h1>
    <p>Select a menu item on the left.</p>
</div>

<script>
function toggleSars() {
    var menu = document.getElementById("sars-submenu");

    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
}
</script>

</body>
</html>
