<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firm Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 250px;
    background: #1e293b;
    color: white;
    height: 100vh;
    padding: 20px;
}

.company-name {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 30px;
}

.menu-item {
    padding: 12px;
    margin-bottom: 5px;
    cursor: pointer;
    border-radius: 6px;
}

.menu-item:hover {
    background: #334155;
}

/* Main content */
.main {
    flex: 1;
    padding: 20px;
    background: #f1f5f9;
}

</style>
</head>

<body>

<div class="sidebar">
    <div class="company-name">Your Company Name</div>

    <div class="menu-item"> Due this week</div>
    <div class="menu-item"> Due this month</div>
    <div class="menu-item"> SARS</div>
    <div class="menu-item"> CIPC</div>
    <div class="menu-item"> Secreterial</div>
    <div class="menu-item"> Staff workload</div>
    <div class="menu-item"> Reports</div>
</div>

<div class="main">
    <h1>Dashboard</h1>
    <p>Select a menu item on the left.</p>
</div>

</body>
</html>
